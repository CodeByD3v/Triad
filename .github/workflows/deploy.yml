name: Deploy — Community Hero

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: asia-south1
  SERVICE: community-hero-api

jobs:
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image
        run: |
          gcloud builds submit backend/ \
            --tag gcr.io/${{ secrets.GCP_PROJECT }}/${{ env.SERVICE }} \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/${{ env.SERVICE }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --concurrency 80 \
            --timeout 60 \
            --set-env-vars "\
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }},\
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }},\
          AWS_REGION=${{ secrets.AWS_REGION }},\
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }},\
          SMTP_HOST=smtp.gmail.com,\
          SMTP_PORT=587,\
          SMTP_USER=${{ secrets.SMTP_USER }},\
          SMTP_PASS=${{ secrets.SMTP_PASS }},\
          AUTHORITY_EMAIL=${{ secrets.AUTHORITY_EMAIL }}"

      - name: Print Cloud Run URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --platform managed --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Backend: $URL"

  deploy-frontend:
    name: Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE:                     ${{ secrets.VITE_API_BASE }}
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId:              ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId:              live
